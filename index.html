<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naija Bites</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🍽️ Naija Bites</h1>
    <p class="tagline">Authentic Nigerian Food Ordering System</p>

    <!-- CUSTOMER INFO -->
    <h2>Customer Details</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="tel" id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Delivery Address"></textarea>

    <!-- MENU -->
    <h2>Menu</h2>

    <div class="menu">

        <div class="item">
            <img src="images/jallof-rice.png">
            <p>Jollof Rice (RM12)</p>
            <input type="number" id="jollof" min="0" value="0">
        </div>
      <div class="item">
            <img src="images/jfried-rice.png">
            <p>Fried Rice (RM15)</p>
            <input type="number" id="fried" min="0" value="0">
        </div>
        <div class="item">
            <img src="images/suya.jpg">
            <p>Suya (RM10)</p>
            <input type="number" id="suya" min="0" value="0">
        </div>
   <div class="item">
            <img src="images/chin-chin.jpg">
            <p>Chin Chin (RM12)</p>
            <input type="number" id="chin" min="0" value="0">
        </div>
        <div class="item">
            <img src="images/puff-puff.jpg">
            <p>Puff Puff (RM4)</p>
            <input type="number" id="puff" min="0" value="0">
        </div>

    </div>

    <!-- CALCULATE -->
    <button onclick="calculateOrder()">Calculate Order</button>

    <div id="summary"></div>

    <!-- PAYMENT -->
    <h2>Payment Method (Last Step)</h2>

    <label>
        <input type="radio" name="payment" value="COD" checked>
        Cash on Delivery
    </label>

    <label>
        <input type="radio" name="payment" value="Bank">
        Bank Transfer
    </label>

    <div id="bankBox" class="hidden">
        <p><b>Bank:</b> Maybank</p>
        <p><b>Account:</b> Naija Bites</p>
        <p><b>Account No:</b> 1234567890</p>

        <input type="file" id="receipt">
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
