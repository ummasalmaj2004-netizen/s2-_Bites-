<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naija Bites Food Order Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🍽️ Naija Bites</h1>
    <p>Delicious Nigerian Meals Delivered to Your Doorstep</p>

    <h2>Customer Information</h2>

    <input type="text" id="name" placeholder="Full Name">

    <input type="tel" id="phone" placeholder="Phone Number">

    <textarea id="address" placeholder="Delivery Address"></textarea>

    <h2>Menu</h2>

    <div class="menu">

        <div class="item">
            <img src="images/jallof-rice.png" alt="Jollof Rice">
            <h3>Jollof Rice</h3>
            <p>RM12.00</p>
            <input type="number" id="jollof" min="0" value="0">
        </div>

        <div class="item">
            <img src="images/fried-rice.png" alt="Fried Rice">
            <h3>Fried Rice</h3>
            <p>RM13.00</p>
            <input type="number" id="fried" min="0" value="0">
        </div>

        <div class="item">
            <img src="images/pounded-yam-egusi.jpg" alt="Pounded Yam">
            <h3>Pounded Yam & Egusi</h3>
            <p>RM18.00</p>
            <input type="number" id="yam" min="0" value="0">
        </div>

        <div class="item">
            <img src="images/eba-okra.jpg" alt="Eba">
            <h3>Eba & Okra Soup</h3>
            <p>RM15.00</p>
            <input type="number" id="eba" min="0" value="0">
        </div>

        <div class="item">
            <img src="images/suya.jpg" alt="Suya">
            <h3>Suya</h3>
            <p>RM10.00</p>
            <input type="number" id="suya" min="0" value="0">
        </div>

        <div class="item">
            <img src="images/moi-moi.jpg" alt="Moi Moi">
            <h3>Moi Moi</h3>
            <p>RM5.00</p>
            <input type="number" id="moi" min="0" value="0">
        </div>

    </div>

    <button onclick="calculateOrder()">Calculate Order</button>

    <div id="summary"></div>

</div>

<script src="script.js"></script>

</body>
</html>
